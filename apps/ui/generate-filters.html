<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Filtros de Nombre</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .section {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
            font-size: 14px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.2s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #input {
            min-height: 150px;
        }
        
        #output {
            min-height: 300px;
            background: #f8f9fa;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        
        .secondary-btn {
            background: #6c757d;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
        }
        
        .secondary-btn:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.6);
        }
        
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            border-left: 4px solid #28a745;
        }
        
        .count {
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Generador de Filtros por Nombre</h1>
        <p class="subtitle">Para agregar múltiples jugadores a tu vista .cmf</p>
        
        <div class="info-box">
            <strong>📝 Instrucciones:</strong> Escribe un nombre por línea. El generador creará automáticamente filtros con lógica "OR" para cada nombre.
        </div>
        
        <div class="section">
            <label for="input">Lista de nombres (uno por línea):</label>
            <textarea id="input" placeholder="Blondel&#10;D. Munteanu&#10;Frank de Boer&#10;..."></textarea>
        </div>
        
        <button onclick="generateFilters()">✨ Generar Filtros</button>
        
        <div class="success-message" id="successMessage">
            ✅ Se generaron <span class="count" id="filterCount">0</span> filtros correctamente
        </div>
        
        <div class="section" style="margin-top: 25px;">
            <label for="output">JSON generado (copia esto en tu .cmf):</label>
            <textarea id="output" readonly placeholder="Los filtros generados aparecerán aquí..."></textarea>
            <div class="button-group">
                <button class="secondary-btn" onclick="copyToClipboard()">📋 Copiar al portapapeles</button>
                <button class="secondary-btn" onclick="clearAll()">🗑️ Limpiar todo</button>
            </div>
        </div>
    </div>
    
    <script>
        function generateFilters() {
            const input = document.getElementById('input').value;
            const names = input.split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);
            
            if (names.length === 0) {
                alert('Por favor, ingresa al menos un nombre');
                return;
            }
            
            const filters = names.map(name => ({
                id: crypto.randomUUID(),
                field: "NOMBRE",
                operator: "eq",
                value: name,
                logic: "OR"
            }));
            
            const output = JSON.stringify(filters, null, 2);
            document.getElementById('output').value = output;
            
            // Mostrar mensaje de éxito
            const successMsg = document.getElementById('successMessage');
            const countSpan = document.getElementById('filterCount');
            countSpan.textContent = names.length;
            successMsg.style.display = 'block';
            
            // Scroll al output
            document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function copyToClipboard() {
            const output = document.getElementById('output');
            if (!output.value) {
                alert('Primero genera los filtros');
                return;
            }
            
            output.select();
            document.execCommand('copy');
            
            // Feedback visual
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✓ Copiado!';
            btn.style.background = '#28a745';
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 2000);
        }
        
        function clearAll() {
            if (confirm('¿Limpiar todo el contenido?')) {
                document.getElementById('input').value = '';
                document.getElementById('output').value = '';
                document.getElementById('successMessage').style.display = 'none';
            }
        }
        
        // Permitir generar con Ctrl+Enter
        document.getElementById('input').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                generateFilters();
            }
        });
    </script>
</body>
</html>
